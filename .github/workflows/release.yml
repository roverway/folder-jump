name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download AHK and Compiler
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path "_setup" -Force | Out-Null
          
          Write-Host "Downloading AutoHotkey v2.0.23..."
          Invoke-WebRequest -Uri "https://github.com/AutoHotkey/AutoHotkey/releases/download/v2.0.23/AutoHotkey_2.0.23.zip" -OutFile "_setup/ahk.zip" -ErrorAction Stop
          
          Write-Host "Downloading Ahk2Exe v1.1.37.02a2..."
          Invoke-WebRequest -Uri "https://github.com/AutoHotkey/Ahk2Exe/releases/download/Ahk2Exe1.1.37.02a2/Ahk2Exe1.1.37.02a2.zip" -OutFile "_setup/a2e.zip" -ErrorAction Stop
          
          Write-Host "Extracting AutoHotkey..."
          Expand-Archive -Path "_setup/ahk.zip" -DestinationPath "_setup/ahk" -Force
          
          Write-Host "Extracting Ahk2Exe..."
          Expand-Archive -Path "_setup/a2e.zip" -DestinationPath "_setup/a2e" -Force
          
          Write-Host "`n=== AutoHotkey 目录结构 ==="
          Get-ChildItem -Path "_setup/ahk" -Recurse -File | Select-Object -ExpandProperty FullName | ForEach-Object { Write-Host $_ }
          
          Write-Host "`n=== Ahk2Exe 目录结构 ==="
          Get-ChildItem -Path "_setup/a2e" -Recurse -File | Select-Object -ExpandProperty FullName | ForEach-Object { Write-Host $_ }

      - name: Compile FolderJump (AHK v2)
        shell: powershell
        run: |
          # 查找 AutoHotkey64.exe
          $ahkBase = Get-ChildItem -Path "_setup/ahk" -Name "AutoHotkey64.exe" -Recurse | Select-Object -First 1
          if ($ahkBase) {
              $ahkBase = Join-Path "_setup/ahk" $ahkBase
          } else {
              throw "Error: Could not find AutoHotkey64.exe in _setup/ahk"
          }
          
          # 查找 Ahk2Exe.exe
          $compiler = Get-ChildItem -Path "_setup/a2e" -Name "Ahk2Exe.exe" -Recurse | Select-Object -First 1
          if ($compiler) {
              $compiler = Join-Path "_setup/a2e" $compiler
          } else {
              throw "Error: Could not find Ahk2Exe.exe in _setup/a2e"
          }
          
          Write-Host "Found AutoHotkey base: $ahkBase"
          Write-Host "Found Ahk2Exe compiler: $compiler"
          
          # 验证文件存在
          if (-not (Test-Path $ahkBase)) { 
              throw "Error: AutoHotkey64.exe not accessible at $ahkBase" 
          }
          if (-not (Test-Path $compiler)) { 
              throw "Error: Ahk2Exe.exe not accessible at $compiler" 
          }
          
          Write-Host "Compiling main.ahk..."
          
          # 编译命令 - 格式必须正确：/in /out /base /cp (不为/base参数添加前缀/$)
          $cmd = @("/in", "main.ahk", "/out", "FolderJump.exe", "/base", $ahkBase, "/cp", "65001")
          Write-Host "Command: $compiler $($cmd -join ' ')"
          
          & $compiler $cmd
          
          if ($LASTEXITCODE -ne 0) {
              throw "Ahk2Exe failed with exit code $LASTEXITCODE"
          }
          
          if (Test-Path "FolderJump.exe") {
              Write-Host "✓ Build success: FolderJump.exe created"
              Get-Item "FolderJump.exe" | Select-Object FullName, Size
          } else {
              throw "Build failed: FolderJump.exe not created"
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: FolderJump.exe
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
