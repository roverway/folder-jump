name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download AHK and Compiler
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path "_setup" -Force | Out-Null
          
          Write-Host "Downloading AutoHotkey v2.0.23..."
          Invoke-WebRequest -Uri "https://github.com/AutoHotkey/AutoHotkey/releases/download/v2.0.23/AutoHotkey_2.0.23.zip" -OutFile "_setup/ahk.zip" -ErrorAction Stop
          
          Write-Host "Downloading Ahk2Exe v1.1.37.02a2..."
          Invoke-WebRequest -Uri "https://github.com/AutoHotkey/Ahk2Exe/releases/download/Ahk2Exe1.1.37.02a2/Ahk2Exe1.1.37.02a2.zip" -OutFile "_setup/a2e.zip" -ErrorAction Stop
          
          Write-Host "Extracting AutoHotkey..."
          Expand-Archive -Path "_setup/ahk.zip" -DestinationPath "_setup/ahk" -Force
          
          Write-Host "Extracting Ahk2Exe..."
          Expand-Archive -Path "_setup/a2e.zip" -DestinationPath "_setup/a2e" -Force
          
          Write-Host "`n=== AutoHotkey 目录结构 ==="
          Get-ChildItem -Path "_setup/ahk" -Recurse -File | Select-Object -ExpandProperty FullName | ForEach-Object { Write-Host $_ }
          
          Write-Host "`n=== Ahk2Exe 目录结构 ==="
          Get-ChildItem -Path "_setup/a2e" -Recurse -File | Select-Object -ExpandProperty FullName | ForEach-Object { Write-Host $_ }

      - name: Compile FolderJump (AHK v2)
        shell: powershell
        run: |
          # Find AutoHotkey64.exe recursively - ensure array
          $ahkFiles = @(Get-ChildItem -Path "_setup/ahk" -Filter "AutoHotkey64.exe" -Recurse -File -ErrorAction SilentlyContinue)
          if ($ahkFiles.Count -eq 0) {
              throw "Error: Could not find AutoHotkey64.exe"
          }
          $ahkBase = $ahkFiles[0].FullName
          
          # Find Ahk2Exe.exe recursively - ensure array
          $exeFiles = @(Get-ChildItem -Path "_setup/a2e" -Filter "Ahk2Exe.exe" -Recurse -File -ErrorAction SilentlyContinue)
          if ($exeFiles.Count -eq 0) {
              throw "Error: Could not find Ahk2Exe.exe"
          }
          $compiler = $exeFiles[0].FullName
          
          Write-Host "Found AutoHotkey base: $ahkBase"
          Write-Host "Found Ahk2Exe compiler: $compiler"
          
          # Verify files exist
          if (-not (Test-Path $ahkBase)) {
              throw "Error: AutoHotkey64.exe not accessible"
          }
          if (-not (Test-Path $compiler)) {
              throw "Error: Ahk2Exe.exe not accessible"
          }
          
          Write-Host "Compiling main.ahk..."
          Write-Host "Current location: $(Get-Location)"
          
          # Build absolute output path to avoid relative path ambiguity
          $outputPath = Join-Path (Get-Location) "FolderJump.exe"
          $args = @("/in", "main.ahk", "/out", $outputPath, "/base", $ahkBase, "/cp", "65001")
          Write-Host "Running: $compiler $($args -join ' ')"
          
          # Execute compiler
          & $compiler $args
          
          # Verify output exists (don't rely on $LASTEXITCODE which may be unreliable)
          Start-Sleep -Milliseconds 1000  # Give file system time to sync
          Get-ChildItem -Path $outputPath -Force -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "Found output: $($_.FullName) ($($_.Length) bytes)" }
          if (-not (Test-Path $outputPath)) {
              throw "Build failed: FolderJump.exe was not created at $outputPath"
          }
          
          $exeInfo = Get-Item $outputPath
          Write-Host "Build success: FolderJump.exe created ($($exeInfo.Length) bytes) at $outputPath"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: FolderJump.exe
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
